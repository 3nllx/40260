    <h1>Gráfico SVG</h1>
<svg width="150" height="150"
    >
    <circle r="40" cx="50" cy="50" fill="red" stroke="black" stroke-width="4">
        <animateTransform
            attributeName="transform"
            begin="0s"
            dur=".01s"
            type="rotate"
            from="0 60 60"
            to="360 60 60"
            repeatCount="indefinite"/>

</svg>
